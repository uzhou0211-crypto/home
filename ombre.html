<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ombre · Brain</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --floor: #F2EEE8;
    --grout: #CECAC2;
    --wall-light: #EDEAE4;
    --wall-shadow: #C8C4BC;
    --oak-top: #C8A882;
    --oak-side: #8B6B4A;
    --copper: #C8A050;
    --ambient: #FAFAF8;
    --warm-glow: #FFF0DC;
    --shadow: #1A1814;
    --ink: #2C2820;
    --ink-faint: #6B6358;
    --ink-ghost: #A09890;
    --valence-pos: #8B9E7A;
    --valence-neg: #9E7A7A;
    --arousal-hi: #C8A050;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--floor);
    color: var(--ink);
    font-family: 'Noto Serif SC', 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.6;
  }

  /* ── header ── */
  .header {
    padding: 48px 64px 32px;
    border-bottom: 1px solid var(--grout);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    position: relative;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 64px;
    width: 48px;
    height: 2px;
    background: var(--copper);
  }

  .title-block h1 {
    font-family: 'IM Fell English', serif;
    font-size: 2.4rem;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--ink);
    line-height: 1;
  }

  .title-block h1 span {
    color: var(--copper);
  }

  .title-block p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem;
    font-style: italic;
    color: var(--ink-ghost);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  .header-meta {
    text-align: right;
    font-family: 'Cormorant Garamond', serif;
  }

  .time-display {
    font-size: 1.8rem;
    font-weight: 300;
    color: var(--ink);
    letter-spacing: 0.05em;
    line-height: 1;
  }

  .time-period {
    font-size: 0.8rem;
    font-style: italic;
    color: var(--ink-ghost);
    margin-top: 4px;
  }

  /* ── nav tabs ── */
  .nav {
    padding: 0 64px;
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--grout);
  }

  .nav-tab {
    padding: 16px 28px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem;
    font-style: italic;
    letter-spacing: 0.08em;
    color: var(--ink-ghost);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }

  .nav-tab:hover { color: var(--ink); }
  .nav-tab.active {
    color: var(--ink);
    border-bottom-color: var(--copper);
  }

  /* ── main layout ── */
  .main {
    display: grid;
    grid-template-columns: 1fr 380px;
    min-height: calc(100vh - 140px);
  }

  /* ── timeline panel ── */
  .timeline-panel {
    padding: 40px 64px;
    border-right: 1px solid var(--grout);
  }

  .section-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-ghost);
    margin-bottom: 28px;
  }

  /* loading state */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 0;
    gap: 16px;
  }

  .loading-dots {
    display: flex;
    gap: 8px;
  }

  .loading-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--grout);
    animation: pulse 1.4s ease-in-out infinite;
  }

  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  .loading-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--ink-ghost);
  }

  /* empty state */
  .empty-state {
    padding: 80px 0;
    text-align: center;
  }

  .empty-state p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--ink-ghost);
    font-size: 1rem;
  }

  /* timeline entries */
  .timeline-entry {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 0 24px;
    margin-bottom: 2px;
    cursor: pointer;
    position: relative;
  }

  .timeline-entry::before {
    content: '';
    position: absolute;
    left: 80px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--grout);
  }

  .entry-time {
    padding: 20px 0;
    text-align: right;
  }

  .entry-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.75rem;
    color: var(--ink-ghost);
    line-height: 1.4;
  }

  .entry-hour {
    font-family: 'IM Fell English', serif;
    font-size: 1.1rem;
    color: var(--ink-faint);
  }

  .entry-body {
    padding: 20px 0 20px 24px;
    position: relative;
    transition: all 0.2s;
  }

  .entry-body::before {
    content: '';
    position: absolute;
    left: -4px;
    top: 26px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--grout);
    transition: all 0.2s;
    border: 2px solid var(--floor);
  }

  .timeline-entry:hover .entry-body::before {
    background: var(--copper);
    transform: scale(1.3);
  }

  .timeline-entry:hover .entry-body {
    background: rgba(200, 160, 80, 0.04);
    border-radius: 4px;
  }

  .entry-summary {
    font-size: 0.9rem;
    color: var(--ink);
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .entry-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .entry-period {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.7rem;
    font-style: italic;
    color: var(--ink-ghost);
  }

  .entry-keywords {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .keyword {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.68rem;
    letter-spacing: 0.05em;
    color: var(--ink-faint);
    background: var(--wall-light);
    padding: 2px 8px;
    border-radius: 2px;
  }

  .entry-emotion {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .emotion-bar {
    width: 40px;
    height: 3px;
    background: var(--grout);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }

  .emotion-fill {
    position: absolute;
    top: 0;
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .has-raw-indicator {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--copper);
    opacity: 0.6;
  }

  /* type badges */
  .entry-type {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    font-style: italic;
    padding: 1px 6px;
    border-radius: 2px;
  }

  .type-diary { color: #7A8B6A; background: rgba(122, 139, 106, 0.1); }
  .type-letter { color: #8B7A6A; background: rgba(139, 122, 106, 0.1); }
  .type-witness { color: #6A7A8B; background: rgba(106, 122, 139, 0.1); }

  /* ── right panel ── */
  .right-panel {
    padding: 40px 40px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  /* detail view */
  .detail-view {
    display: none;
    flex-direction: column;
    gap: 16px;
  }

  .detail-view.visible { display: flex; }

  .detail-header {
    padding-bottom: 16px;
    border-bottom: 1px solid var(--grout);
  }

  .detail-title {
    font-family: 'IM Fell English', serif;
    font-size: 1rem;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .detail-time {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.75rem;
    font-style: italic;
    color: var(--ink-ghost);
  }

  .detail-content {
    font-size: 0.85rem;
    line-height: 1.8;
    color: var(--ink-faint);
    white-space: pre-wrap;
    max-height: 400px;
    overflow-y: auto;
    padding-right: 8px;
  }

  .detail-content::-webkit-scrollbar {
    width: 3px;
  }

  .detail-content::-webkit-scrollbar-track {
    background: var(--wall-light);
  }

  .detail-content::-webkit-scrollbar-thumb {
    background: var(--grout);
    border-radius: 2px;
  }

  .detail-loading {
    text-align: center;
    padding: 40px 0;
  }

  .detail-loading p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--ink-ghost);
  }

  .close-detail {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.75rem;
    font-style: italic;
    color: var(--ink-ghost);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    background: none;
    border: none;
    padding: 0;
    text-align: left;
  }

  .close-detail:hover { color: var(--ink); }

  /* emotion panel */
  .emotion-panel {
    background: var(--wall-light);
    padding: 24px;
    border-radius: 4px;
  }

  .emotion-panel-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-ghost);
    margin-bottom: 16px;
  }

  .emotion-chart {
    position: relative;
    width: 100%;
    padding-bottom: 100%;
  }

  .emotion-chart-inner {
    position: absolute;
    inset: 0;
  }

  /* drift chart */
  .drift-panel {
    padding: 24px;
    border: 1px solid var(--grout);
    border-radius: 4px;
  }

  .drift-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-ghost);
    margin-bottom: 16px;
  }

  .drift-bars {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .drift-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .drift-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.72rem;
    color: var(--ink-ghost);
    width: 36px;
    text-align: right;
    flex-shrink: 0;
  }

  .drift-bar-track {
    flex: 1;
    height: 4px;
    background: var(--grout);
    border-radius: 2px;
    position: relative;
  }

  .drift-bar-fill {
    position: absolute;
    top: 0;
    height: 100%;
    border-radius: 2px;
    background: var(--copper);
    transition: width 0.5s ease;
  }

  .drift-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.7rem;
    color: var(--ink-faint);
    width: 40px;
    flex-shrink: 0;
  }

  /* stats row */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .stat-card {
    background: var(--wall-light);
    padding: 16px;
    border-radius: 4px;
  }

  .stat-value {
    font-family: 'IM Fell English', serif;
    font-size: 1.8rem;
    color: var(--ink);
    line-height: 1;
  }

  .stat-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.7rem;
    font-style: italic;
    color: var(--ink-ghost);
    margin-top: 4px;
  }

  /* input area */
  .input-area {
    margin-top: auto;
    padding-top: 24px;
    border-top: 1px solid var(--grout);
  }

  .search-input {
    width: 100%;
    padding: 12px 0;
    background: none;
    border: none;
    border-bottom: 1px solid var(--grout);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem;
    font-style: italic;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input::placeholder {
    color: var(--ink-ghost);
  }

  .search-input:focus {
    border-bottom-color: var(--copper);
  }

  /* tabs content */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* letters/diary tab */
  .special-entries {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .special-entry {
    padding: 20px 24px;
    border-left: 2px solid var(--grout);
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .special-entry:hover {
    border-left-color: var(--copper);
  }

  .special-entry-type {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-style: italic;
    color: var(--ink-ghost);
    margin-bottom: 6px;
  }

  .special-entry-title {
    font-family: 'IM Fell English', serif;
    font-size: 1rem;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .special-entry-time {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.72rem;
    font-style: italic;
    color: var(--ink-ghost);
  }

  /* back link */
  .back-link {
    position: fixed;
    top: 24px;
    right: 32px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.75rem;
    font-style: italic;
    color: var(--ink-ghost);
    text-decoration: none;
    letter-spacing: 0.05em;
    transition: color 0.2s;
    z-index: 100;
  }

  .back-link:hover { color: var(--ink); }

  /* error */
  .error-msg {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.82rem;
    color: var(--valence-neg);
    padding: 12px 0;
  }

  /* scrollbar */
  .timeline-panel::-webkit-scrollbar { width: 3px; }
  .timeline-panel::-webkit-scrollbar-track { background: transparent; }
  .timeline-panel::-webkit-scrollbar-thumb { background: var(--grout); }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .right-panel { display: none; }
    .header { padding: 32px 24px 24px; }
    .nav { padding: 0 24px; }
    .timeline-panel { padding: 32px 24px; }
  }
</style>
</head>
<body>

<a href="index.html" class="back-link">← 回到家</a>

<header class="header">
  <div class="title-block">
    <h1>Ombre <span>·</span> Brain</h1>
    <p>记忆 · 时间 · 情感的痕迹</p>
  </div>
  <div class="header-meta">
    <div class="time-display" id="clock">--:--</div>
    <div class="time-period" id="period">——</div>
  </div>
</header>

<nav class="nav">
  <button class="nav-tab active" onclick="switchTab('timeline', this)">时间轴</button>
  <button class="nav-tab" onclick="switchTab('letters', this)">信 · 日记</button>
  <button class="nav-tab" onclick="switchTab('drift', this)">情绪漂移</button>
</nav>

<div class="main">
  <!-- left: timeline -->
  <div class="timeline-panel">

    <!-- timeline tab -->
    <div class="tab-content active" id="tab-timeline">
      <div class="section-label">记忆时间轴</div>
      <div id="timeline-container">
        <div class="loading">
          <div class="loading-dots">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
          </div>
          <p class="loading-text">正在读取记忆……</p>
        </div>
      </div>
    </div>

    <!-- letters/diary tab -->
    <div class="tab-content" id="tab-letters">
      <div class="section-label">信 · 日记 · 见证</div>
      <div id="special-container">
        <div class="loading">
          <div class="loading-dots">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
          </div>
          <p class="loading-text">正在读取……</p>
        </div>
      </div>
    </div>

    <!-- drift tab -->
    <div class="tab-content" id="tab-drift">
      <div class="section-label">情绪漂移 · 最近7天</div>
      <div id="drift-container">
        <div class="loading">
          <div class="loading-dots">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
          </div>
          <p class="loading-text">正在分析……</p>
        </div>
      </div>
    </div>

  </div>

  <!-- right: detail + stats -->
  <div class="right-panel">

    <!-- stats -->
    <div id="stats-section">
      <div class="section-label">概览</div>
      <div class="stats-row" id="stats-row">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-label">条记忆</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-unresolved">—</div>
          <div class="stat-label">未完成</div>
        </div>
      </div>
    </div>

    <!-- detail view -->
    <div class="detail-view" id="detail-view">
      <div class="detail-header">
        <div class="detail-title" id="detail-title">——</div>
        <div class="detail-time" id="detail-time">——</div>
      </div>
      <div class="detail-content" id="detail-content">
        <div class="detail-loading"><p>正在打开……</p></div>
      </div>
      <button class="close-detail" onclick="closeDetail()">收起 ←</button>
    </div>

    <!-- emotion scatter -->
    <div class="emotion-panel" id="emotion-panel" style="display:none">
      <div class="emotion-panel-title">情感分布</div>
      <canvas id="emotion-canvas" width="300" height="300"></canvas>
    </div>

    <!-- search -->
    <div class="input-area">
      <input
        class="search-input"
        type="text"
        placeholder="在记忆里寻找……"
        id="search-input"
        oninput="filterTimeline(this.value)"
      >
    </div>

  </div>
</div>

<script>
const MCP_URL = 'https://ombre-brain-production-f64f.up.railway.app/mcp';
let allEntries = [];
let specialEntries = [];

// ── clock ──────────────────────────────────────────────
const PERIODS = [
  [0,5,'深夜'],[5,8,'清晨'],[8,12,'上午'],
  [12,17,'午后'],[17,20,'傍晚'],[20,23,'夜晚'],[23,24,'失眠']
];

function getPeriod(h) {
  for (const [lo,hi,name] of PERIODS) if (h>=lo && h<hi) return name;
  return '深夜';
}

function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}`;
  document.getElementById('period').textContent = getPeriod(now.getHours());
}
updateClock();
setInterval(updateClock, 30000);

// ── tab switching ──────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');

  if (name === 'letters' && specialEntries.length === 0) loadSpecial();
  if (name === 'drift') loadDrift();
}

// ── MCP call ──────────────────────────────────────────
async function callMCP(toolName, args = {}) {
  const res = await fetch(MCP_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json, text/event-stream' },
    body: JSON.stringify({
      jsonrpc: '2.0',
      id: Date.now(),
      method: 'tools/call',
      params: { name: toolName, arguments: args }
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  const content = data.result?.content;
  if (Array.isArray(content)) return content.map(c => c.text || '').join('\n');
  return '';
}

// ── parse timeline text ───────────────────────────────
function parseTimeline(text) {
  const entries = [];
  const blocks = text.split(/\n(?=\[\d+\])/);
  for (const block of blocks) {
    if (!block.trim() || block.startsWith('📅')) continue;
    const lines = block.trim().split('\n');
    const entry = {};

    // [N] date weekday period 📄
    const headerMatch = lines[0]?.match(/\[(\d+)\]\s*([\d\-T:+\.]+)?\s*(周[一二三四五六日])?\s*([\u4e00-\u9fa5]{2})?\s*(📄)?/);
    if (headerMatch) {
      entry.time = headerMatch[2] || '';
      entry.weekday = headerMatch[3] || '';
      entry.period = headerMatch[4] || '';
      entry.has_raw = !!headerMatch[5];
    }

    for (const line of lines) {
      if (line.includes('关键词：')) entry.keywords = line.replace(/.*关键词：/, '').split('、').map(k=>k.trim()).filter(Boolean);
      if (line.includes('摘要：')) entry.summary = line.replace(/.*摘要：/, '').trim();
      if (line.includes('情感：')) {
        const vm = line.match(/效价([+-]?[\d.]+)/);
        const am = line.match(/唤醒度([\d.]+)/);
        if (vm) entry.valence = parseFloat(vm[1]);
        if (am) entry.arousal = parseFloat(am[1]);
      }
      if (line.includes('ID：')) entry.id = line.replace(/.*ID：/, '').trim();
      if (line.includes('类型：')) entry.type = line.replace(/.*类型：/, '').trim();
    }

    if (entry.id) entries.push(entry);
  }
  return entries;
}

// ── render timeline ───────────────────────────────────
function renderTimeline(entries) {
  const container = document.getElementById('timeline-container');

  if (!entries.length) {
    container.innerHTML = '<div class="empty-state"><p>时间轴为空，暂无记忆。</p></div>';
    return;
  }

  document.getElementById('stat-total').textContent = entries.length;
  const unresolved = entries.filter(e => !e.resolved).length;
  document.getElementById('stat-unresolved').textContent = unresolved;

  container.innerHTML = entries.map(e => {
    const dateStr = e.time ? e.time.slice(0,10) : '——';
    const hourStr = e.time ? e.time.slice(11,16) : '——';
    const summary = e.summary || '（无摘要）';
    const kws = (e.keywords || []).slice(0,4);
    const v = e.valence ?? 0;
    const a = e.arousal ?? 0;

    // valence bar: center=50%, positive goes right, negative goes left
    const vPct = Math.round(((v + 1) / 2) * 100);
    const vColor = v >= 0 ? 'var(--valence-pos)' : 'var(--valence-neg)';

    const typeLabel = e.type && ['diary','letter','witness'].includes(e.type)
      ? `<span class="entry-type type-${e.type}">${{diary:'日记',letter:'信',witness:'见证'}[e.type]}</span>`
      : '';

    return `
      <div class="timeline-entry" onclick="openEntry('${e.id}', '${summary.replace(/'/g,"\\'")}', '${e.time || ''}')">
        <div class="entry-time">
          <div class="entry-date">${dateStr.slice(5)}<br>${e.weekday || ''}</div>
          <div class="entry-hour">${hourStr}</div>
        </div>
        <div class="entry-body">
          <div class="entry-summary">${summary}</div>
          <div class="entry-meta">
            <span class="entry-period">${e.period || ''}</span>
            ${typeLabel}
            <div class="entry-keywords">
              ${kws.map(k=>`<span class="keyword">${k}</span>`).join('')}
            </div>
            <div class="entry-emotion">
              ${e.has_raw ? '<div class="has-raw-indicator"></div>' : ''}
              <div class="emotion-bar">
                <div class="emotion-fill" style="left:${Math.min(50,vPct)}%;width:${Math.abs(vPct-50)}%;background:${vColor}"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  drawEmotionScatter(entries);
}

// ── emotion scatter canvas ────────────────────────────
function drawEmotionScatter(entries) {
  const panel = document.getElementById('emotion-panel');
  const canvas = document.getElementById('emotion-canvas');
  if (!entries.length) return;

  panel.style.display = 'block';
  const ctx = canvas.getContext('2d');
  const W = 300, H = 300;
  ctx.clearRect(0,0,W,H);

  // axes
  ctx.strokeStyle = '#CECAC2';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H);
  ctx.moveTo(0, H/2); ctx.lineTo(W, H/2);
  ctx.stroke();

  // axis labels
  ctx.font = '10px Cormorant Garamond';
  ctx.fillStyle = '#A09890';
  ctx.fillText('正面', W-28, H/2-6);
  ctx.fillText('负面', 4, H/2-6);
  ctx.fillText('强烈', W/2+6, 12);
  ctx.fillText('平静', W/2+6, H-4);

  // dots
  for (const e of entries) {
    const v = e.valence ?? 0;
    const a = e.arousal ?? 0.5;
    const x = W/2 + v * (W/2 - 20);
    const y = H/2 - a * (H/2 - 20);
    const r = 3 + (e.arousal || 0) * 3;

    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fillStyle = v >= 0
      ? `rgba(139, 158, 122, ${0.3 + Math.abs(v) * 0.5})`
      : `rgba(158, 122, 122, ${0.3 + Math.abs(v) * 0.5})`;
    ctx.fill();
  }
}

// ── load timeline ─────────────────────────────────────
async function loadTimeline() {
  try {
    const text = await callMCP('timeline', { limit: 50 });
    allEntries = parseTimeline(text);
    renderTimeline(allEntries);
  } catch(err) {
    document.getElementById('timeline-container').innerHTML =
      `<div class="error-msg">连接失败：${err.message}</div>`;
  }
}

// ── filter ────────────────────────────────────────────
function filterTimeline(q) {
  if (!q.trim()) { renderTimeline(allEntries); return; }
  const lq = q.toLowerCase();
  const filtered = allEntries.filter(e =>
    (e.summary || '').toLowerCase().includes(lq) ||
    (e.keywords || []).some(k => k.toLowerCase().includes(lq))
  );
  renderTimeline(filtered);
}

// ── open entry ────────────────────────────────────────
async function openEntry(id, summary, time) {
  const detail = document.getElementById('detail-view');
  const statsSection = document.getElementById('stats-section');

  detail.classList.add('visible');
  statsSection.style.display = 'none';

  document.getElementById('detail-title').textContent = summary;
  document.getElementById('detail-time').textContent = time ? time.slice(0,16).replace('T',' ') : '——';
  document.getElementById('detail-content').innerHTML = '<div class="detail-loading"><p>正在打开原文……</p></div>';

  try {
    const text = await callMCP('open_raw', { bucket_id: id });
    document.getElementById('detail-content').textContent = text || '（原文为空）';
  } catch(err) {
    document.getElementById('detail-content').innerHTML = `<span style="color:var(--valence-neg);font-style:italic">打开失败：${err.message}</span>`;
  }
}

function closeDetail() {
  document.getElementById('detail-view').classList.remove('visible');
  document.getElementById('stats-section').style.display = 'block';
}

// ── load special (letters/diary) ──────────────────────
async function loadSpecial() {
  try {
    const text = await callMCP('timeline', { limit: 100 });
    const all = parseTimeline(text);
    specialEntries = all.filter(e => ['diary','letter','witness'].includes(e.type));
    renderSpecial(specialEntries);
  } catch(err) {
    document.getElementById('special-container').innerHTML =
      `<div class="error-msg">连接失败：${err.message}</div>`;
  }
}

function renderSpecial(entries) {
  const container = document.getElementById('special-container');
  if (!entries.length) {
    container.innerHTML = '<div class="empty-state"><p>暂无信、日记或见证记录。</p></div>';
    return;
  }

  const typeNames = { diary:'日记', letter:'信', witness:'见证' };

  container.innerHTML = `<div class="special-entries">` +
    entries.map(e => `
      <div class="special-entry" onclick="openEntry('${e.id}','${(e.summary||'').replace(/'/g,"\\'")}','${e.time||''}')">
        <div class="special-entry-type">${typeNames[e.type] || e.type}</div>
        <div class="special-entry-title">${e.summary || '（无标题）'}</div>
        <div class="special-entry-time">${e.time ? e.time.slice(0,16).replace('T',' ') : '——'} ${e.weekday||''} ${e.period||''}</div>
      </div>
    `).join('') +
  `</div>`;
}

// ── load drift ────────────────────────────────────────
async function loadDrift() {
  const container = document.getElementById('drift-container');
  container.innerHTML = `<div class="loading"><div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div><p class="loading-text">正在分析情绪漂移……</p></div>`;

  try {
    const text = await callMCP('drift', { days: 7 });
    renderDrift(text);
  } catch(err) {
    container.innerHTML = `<div class="error-msg">连接失败：${err.message}</div>`;
  }
}

function renderDrift(text) {
  const container = document.getElementById('drift-container');
  if (!text || text.includes('没有足够')) {
    container.innerHTML = '<div class="empty-state"><p>记忆还太少，暂无漂移数据。</p></div>';
    return;
  }

  const lines = text.split('\n').filter(l => l.trim());
  const dataLines = lines.filter(l => /今天|天前/.test(l));
  const trendLines = lines.filter(l => l.includes('→'));

  if (!dataLines.length) {
    container.innerHTML = `<div style="font-family:Cormorant Garamond,serif;font-style:italic;color:var(--ink-faint);font-size:0.85rem;line-height:1.8;white-space:pre-wrap">${text}</div>`;
    return;
  }

  const bars = dataLines.map(line => {
    const label = line.match(/今天|(\d+天前)/)?.[0] || '';
    const vm = line.match(/效价([+-]?[\d.]+)/);
    const am = line.match(/唤醒度([\d.]+)/);
    return {
      label,
      v: vm ? parseFloat(vm[1]) : 0,
      a: am ? parseFloat(am[1]) : 0.5,
    };
  });

  container.innerHTML = `
    <div class="drift-panel">
      <div class="drift-title">效价变化</div>
      <div class="drift-bars">
        ${bars.map(b => {
          const pct = Math.round(((b.v + 1) / 2) * 100);
          return `
            <div class="drift-row">
              <div class="drift-label">${b.label}</div>
              <div class="drift-bar-track">
                <div class="drift-bar-fill" style="left:${Math.min(50,pct)}%;width:${Math.abs(pct-50)}%;background:${b.v>=0?'var(--valence-pos)':'var(--valence-neg)'}"></div>
              </div>
              <div class="drift-value">${b.v >= 0 ? '+' : ''}${b.v.toFixed(2)}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
    ${trendLines.length ? `
      <div style="margin-top:20px;padding:0 4px">
        ${trendLines.map(l => `
          <p style="font-family:Cormorant Garamond,serif;font-style:italic;font-size:0.85rem;color:var(--ink-faint);line-height:1.8">${l.trim()}</p>
        `).join('')}
      </div>
    ` : ''}
  `;
}

// ── init ──────────────────────────────────────────────
loadTimeline();
</script>
