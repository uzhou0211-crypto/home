<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexis · Academic Translator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #f8f7f4;
  --white:   #ffffff;
  --ink:     #0f0e0b;
  --ink-2:   #2a2820;
  --ink-3:   #5a5850;
  --ink-4:   #909080;
  --ink-5:   #c0bfb8;
  --blue:    #1a4a8a;
  --blue-2:  #2a6ab0;
  --blue-pale: #eef3fa;
  --green:   #1a6a3a;
  --green-pale: #eef6f0;
  --border:  rgba(15,14,11,0.10);
  --border-2:rgba(15,14,11,0.16);
  --shadow:  rgba(15,14,11,0.06);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Source Serif 4', Georgia, serif;
  min-height: 100vh;
  line-height: 1.6;
}

/* subtle grid texture */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(15,14,11,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(15,14,11,0.025) 1px, transparent 1px);
  background-size: 32px 32px;
}

.wrap {
  max-width: 820px; margin: 0 auto;
  padding: 48px 32px 80px;
  position: relative; z-index: 1;
}

/* ── HEADER ── */
header {
  margin-bottom: 48px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border-2);
  display: flex; align-items: baseline; justify-content: space-between;
}

.logo-block { }
.logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; font-weight: 400; letter-spacing: 0.18em;
  color: var(--ink); text-transform: uppercase;
}
.logo-sub {
  font-size: 11px; color: var(--ink-4);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.08em; margin-top: 3px;
}

.header-meta {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--ink-5); letter-spacing: 0.1em; text-align: right;
  line-height: 1.8;
}

/* ── INPUT AREA ── */
.section-label {
  font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
  letter-spacing: 0.18em; color: var(--ink-4); text-transform: uppercase;
  margin-bottom: 10px; display: flex; align-items: center; gap: 10px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border-2); }

.input-card {
  background: var(--white);
  border: 1px solid var(--border-2);
  border-radius: 4px;
  box-shadow: 0 2px 12px var(--shadow);
  margin-bottom: 28px;
  overflow: hidden;
}

.input-toolbar {
  padding: 10px 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}

.toolbar-label {
  font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
  letter-spacing: 0.12em; color: var(--ink-4); text-transform: uppercase;
}

select {
  padding: 5px 10px;
  background: var(--white); border: 1px solid var(--border-2);
  border-radius: 3px; font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--ink); outline: none; cursor: pointer;
  transition: border-color 0.2s;
}
select:focus { border-color: var(--blue); }

textarea {
  width: 100%; padding: 20px;
  background: transparent; border: none;
  font-family: 'Source Serif 4', serif; font-size: 15px;
  color: var(--ink); outline: none; resize: vertical;
  min-height: 180px; line-height: 1.82;
}
textarea::placeholder { color: var(--ink-5); font-style: italic; }

.input-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px;
}

.char-count {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--ink-5); letter-spacing: 0.06em;
}

.btn {
  padding: 9px 24px; border: none; border-radius: 3px; cursor: pointer;
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  letter-spacing: 0.12em; text-transform: uppercase; transition: all 0.2s;
}
.btn-primary {
  background: var(--ink); color: var(--bg);
  box-shadow: 0 2px 8px rgba(15,14,11,0.2);
}
.btn-primary:hover { background: var(--ink-2); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(15,14,11,0.22); }
.btn-ghost {
  background: transparent; color: var(--ink-3);
  border: 1px solid var(--border-2);
}
.btn-ghost:hover { background: var(--bg); color: var(--ink); }
.btn-sm { padding: 5px 12px; font-size: 9.5px; }

/* ── SETTINGS ROW ── */
.settings-row {
  display: flex; gap: 16px; align-items: center;
  margin-bottom: 28px; flex-wrap: wrap;
}
.setting-group {
  display: flex; align-items: center; gap: 8px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 0.08em; color: var(--ink-4);
}

/* voice speed slider */
input[type="range"] {
  -webkit-appearance: none; width: 80px; height: 2px;
  background: var(--border-2); outline: none; border-radius: 1px;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px;
  background: var(--ink); border-radius: 50%; cursor: pointer;
}

/* ── SENTENCES ── */
.results { display: flex; flex-direction: column; gap: 0; }

.sentence-block {
  border-bottom: 1px solid var(--border);
  padding: 20px 0;
  display: grid; grid-template-columns: 24px 1fr;
  gap: 0 16px;
  animation: blockIn 0.3s ease both;
}
.sentence-block:last-child { border-bottom: none; }

@keyframes blockIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.sentence-num {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--ink-5); letter-spacing: 0.05em; padding-top: 2px;
  text-align: right;
}

.sentence-content { }

.sentence-en {
  font-size: 15.5px; line-height: 1.78; color: var(--ink);
  margin-bottom: 10px; cursor: pointer;
  transition: background 0.15s; border-radius: 2px; padding: 2px 4px; margin-left: -4px;
}
.sentence-en:hover { background: rgba(26,74,138,0.06); }
.sentence-en.playing { background: var(--blue-pale); color: var(--blue); }

.sentence-zh {
  font-size: 14.5px; line-height: 1.82; color: var(--ink-3);
  padding: 10px 14px;
  background: var(--bg);
  border-left: 2px solid var(--border-2);
  border-radius: 0 3px 3px 0;
  font-style: italic;
}
.sentence-zh.loading {
  color: var(--ink-5);
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

.sentence-actions {
  display: flex; gap: 6px; margin-top: 8px; align-items: center;
}

.action-btn {
  background: none; border: 1px solid var(--border); border-radius: 2px;
  padding: 3px 10px; cursor: pointer;
  font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
  color: var(--ink-4); letter-spacing: 0.06em; transition: all 0.15s;
}
.action-btn:hover { background: var(--bg); color: var(--ink); border-color: var(--border-2); }
.action-btn.active { background: var(--blue-pale); color: var(--blue); border-color: var(--blue-2); }

/* word tooltip */
.sentence-en .word-hl {
  cursor: pointer; border-bottom: 1px dotted var(--ink-4);
  transition: border-color 0.15s;
}
.sentence-en .word-hl:hover { border-bottom-color: var(--blue); color: var(--blue); }

/* ── PROGRESS BAR ── */
.progress-wrap {
  height: 2px; background: var(--border); border-radius: 1px;
  margin-bottom: 20px; overflow: hidden; display: none;
}
.progress-fill {
  height: 100%; background: var(--blue); border-radius: 1px;
  transition: width 0.3s; width: 0%;
}

/* ── STATS BAR ── */
.stats-bar {
  display: flex; gap: 24px; padding: 12px 16px;
  background: var(--white); border: 1px solid var(--border);
  border-radius: 3px; margin-bottom: 20px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--ink-4); letter-spacing: 0.06em; flex-wrap: wrap;
  display: none;
}
.stats-bar span { color: var(--ink); }

/* ── EMPTY ── */
.empty {
  text-align: center; padding: 60px 20px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--ink-5); letter-spacing: 0.1em; line-height: 2;
  text-transform: uppercase;
}

/* ── TOOLTIP ── */
.tooltip {
  position: fixed; z-index: 999;
  background: var(--ink); color: var(--bg);
  padding: 8px 14px; border-radius: 3px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  line-height: 1.6; letter-spacing: 0.04em;
  max-width: 240px; pointer-events: none;
  display: none; box-shadow: 0 4px 16px rgba(15,14,11,0.3);
}

/* loading dots */
.dots { display: inline-flex; gap: 3px; align-items: center; }
.dot { width: 4px; height: 4px; background: var(--ink-4); border-radius: 50%; animation: bk 1.1s ease-in-out infinite; }
.dot:nth-child(2){animation-delay:.18s}.dot:nth-child(3){animation-delay:.36s}
@keyframes bk{0%,80%,100%{opacity:.2;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}

@media(max-width:640px) {
  .wrap { padding: 28px 20px 60px; }
  header { flex-direction: column; gap: 8px; }
  .header-meta { text-align: left; }
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo-block">
      <div class="logo">Lexis</div>
      <div class="logo-sub">Academic Translation · Sentence by Sentence</div>
    </div>
    <div class="header-meta">
      Translation via Google Translate API<br>
      TTS via Web Speech API · No key required
    </div>
  </header>

  <!-- input -->
  <div class="section-label">Input · 粘贴原文</div>
  <div class="input-card">
    <div class="input-toolbar">
      <span class="toolbar-label">From</span>
      <select id="lang-from">
        <option value="en">English</option>
        <option value="de">Deutsch</option>
        <option value="fr">Français</option>
        <option value="ja">日本語</option>
        <option value="es">Español</option>
      </select>
      <span class="toolbar-label">→ To</span>
      <select id="lang-to">
        <option value="zh-CN">中文（简体）</option>
        <option value="zh-TW">中文（繁體）</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
      </select>
    </div>
    <textarea id="input-text" placeholder="Paste academic text here — it will be split into sentences and translated one by one.

将论文或文章粘贴在这里，逐句翻译。"></textarea>
    <div class="input-footer">
      <span class="char-count" id="char-count">0 characters · 0 sentences detected</span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="clearAll()">Clear</button>
        <button class="btn btn-primary" onclick="translate()">Translate →</button>
      </div>
    </div>
  </div>

  <!-- settings -->
  <div class="settings-row">
    <div class="setting-group">
      <span>Voice speed</span>
      <input type="range" id="speed" min="0.5" max="1.5" step="0.1" value="0.85"
        oninput="document.getElementById('speed-val').textContent=this.value+'×'">
      <span id="speed-val">0.85×</span>
    </div>
    <div class="setting-group">
      <span>Voice</span>
      <select id="voice-select" style="min-width:140px">
        <option value="">Default English</option>
      </select>
    </div>
    <button class="btn btn-ghost btn-sm" id="btn-read-all" onclick="readAll()" style="display:none">
      ▶ Read All
    </button>
    <button class="btn btn-ghost btn-sm" id="btn-stop" onclick="stopAll()" style="display:none">
      ■ Stop
    </button>
  </div>

  <!-- progress -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <!-- stats -->
  <div class="stats-bar" id="stats-bar">
    <div>Sentences <span id="s-total">0</span></div>
    <div>Translated <span id="s-done">0</span></div>
    <div>Source <span id="s-from">—</span></div>
  </div>

  <!-- results -->
  <div id="results" class="results">
    <div class="empty">
      Paste text above and click Translate<br>
      粘贴文字后点击翻译
    </div>
  </div>

</div>

<!-- word tooltip -->
<div class="tooltip" id="tooltip"></div>

<script>
// ── VOICE SETUP ──────────────────────────────────
let voices = [];
let currentUtterance = null;
let readAllQueue = [];
let isReadingAll = false;

function loadVoices() {
  voices = window.speechSynthesis.getVoices();
  const sel = document.getElementById('voice-select');
  sel.innerHTML = '<option value="">Default</option>';
  voices
    .filter(v => v.lang.startsWith('en'))
    .forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = v.name + (v.default ? ' ★' : '');
      sel.appendChild(opt);
    });
}

window.speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

// ── TEXT PROCESSING ───────────────────────────────
function splitSentences(text) {
  // split on . ! ? followed by space or end, but keep abbreviations intact
  const raw = text
    .replace(/\n+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();

  const sentences = [];
  const regex = /[^.!?]*[.!?]+(?:\s|$)/g;
  let match;
  let last = 0;

  while ((match = regex.exec(raw)) !== null) {
    const s = match[0].trim();
    if (s.length > 8) sentences.push(s);
    last = regex.lastIndex;
  }

  // remainder
  const rem = raw.slice(last).trim();
  if (rem.length > 8) sentences.push(rem);

  return sentences.length ? sentences : [raw];
}

// update char count live
document.getElementById('input-text').addEventListener('input', function() {
  const text = this.value.trim();
  const sents = text ? splitSentences(text).length : 0;
  document.getElementById('char-count').textContent =
    `${text.length} characters · ${sents} sentence${sents !== 1 ? 's' : ''} detected`;
});

// ── TRANSLATION ──────────────────────────────────
let sentences = [];
let translated = 0;

async function translateSentence(text, from, to) {
  // Google Translate unofficial API
  const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(text)}`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    return d[0].map(x => x[0]).join('');
  } catch(e) {
    return '— translation failed —';
  }
}

async function translate() {
  const text = document.getElementById('input-text').value.trim();
  if (!text) return;

  const from = document.getElementById('lang-from').value;
  const to   = document.getElementById('lang-to').value;

  sentences = splitSentences(text);
  translated = 0;

  // show progress
  const pw = document.getElementById('progress-wrap');
  pw.style.display = 'block';
  document.getElementById('progress-fill').style.width = '0%';

  // stats
  const sb = document.getElementById('stats-bar');
  sb.style.display = 'flex';
  document.getElementById('s-total').textContent = sentences.length;
  document.getElementById('s-done').textContent = '0';
  document.getElementById('s-from').textContent = from.toUpperCase();

  // render empty blocks first
  const results = document.getElementById('results');
  results.innerHTML = sentences.map((s, i) => `
    <div class="sentence-block" id="blk-${i}" style="animation-delay:${i*0.04}s">
      <div class="sentence-num">${i+1}</div>
      <div class="sentence-content">
        <div class="sentence-en" onclick="speak(${i})" id="en-${i}">${eh(s)}</div>
        <div class="sentence-zh loading" id="zh-${i}">
          <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>
        <div class="sentence-actions">
          <button class="action-btn" onclick="speak(${i})" id="speak-btn-${i}">▶ Read</button>
          <button class="action-btn" onclick="copyBoth(${i})">Copy</button>
        </div>
      </div>
    </div>`).join('');

  // translate in batches of 3
  const batchSize = 3;
  for (let i = 0; i < sentences.length; i += batchSize) {
    const batch = sentences.slice(i, Math.min(i + batchSize, sentences.length));
    await Promise.all(batch.map(async (s, j) => {
      const idx = i + j;
      const result = await translateSentence(s, from, to);
      const zhEl = document.getElementById('zh-' + idx);
      if (zhEl) {
        zhEl.classList.remove('loading');
        zhEl.textContent = result;
      }
      translated++;
      document.getElementById('s-done').textContent = translated;
      document.getElementById('progress-fill').style.width =
        Math.round(translated / sentences.length * 100) + '%';
    }));
  }

  // show read all button
  document.getElementById('btn-read-all').style.display = 'inline-block';
  setTimeout(() => { pw.style.display = 'none'; }, 600);
}

// ── TTS ──────────────────────────────────────────
function speak(idx) {
  stopAll();
  const text = sentences[idx];
  if (!text) return;

  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = parseFloat(document.getElementById('speed').value);
  utter.lang = document.getElementById('lang-from').value === 'en' ? 'en-US' : document.getElementById('lang-from').value;

  const voiceIdx = document.getElementById('voice-select').value;
  if (voiceIdx !== '' && voices[parseInt(voiceIdx)]) {
    utter.voice = voices[parseInt(voiceIdx)];
  }

  const enEl = document.getElementById('en-' + idx);
  const btnEl = document.getElementById('speak-btn-' + idx);

  utter.onstart = () => {
    enEl?.classList.add('playing');
    if (btnEl) btnEl.classList.add('active');
    if (btnEl) btnEl.textContent = '■ Stop';
  };
  utter.onend = utter.onerror = () => {
    enEl?.classList.remove('playing');
    if (btnEl) btnEl.classList.remove('active');
    if (btnEl) btnEl.textContent = '▶ Read';
  };

  currentUtterance = utter;
  window.speechSynthesis.speak(utter);
}

async function readAll() {
  if (isReadingAll) { stopAll(); return; }
  isReadingAll = true;
  document.getElementById('btn-read-all').textContent = '■ Stop All';
  document.getElementById('btn-stop').style.display = 'inline-block';

  for (let i = 0; i < sentences.length; i++) {
    if (!isReadingAll) break;
    await new Promise(resolve => {
      const text = sentences[i];
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = parseFloat(document.getElementById('speed').value);
      utter.lang = 'en-US';
      const voiceIdx = document.getElementById('voice-select').value;
      if (voiceIdx !== '' && voices[parseInt(voiceIdx)]) utter.voice = voices[parseInt(voiceIdx)];

      const enEl = document.getElementById('en-' + i);
      enEl?.classList.add('playing');
      enEl?.scrollIntoView({ behavior: 'smooth', block: 'center' });

      utter.onend = utter.onerror = () => {
        enEl?.classList.remove('playing');
        resolve();
      };
      currentUtterance = utter;
      window.speechSynthesis.speak(utter);
    });
    // small gap between sentences
    await new Promise(r => setTimeout(r, 120));
  }

  isReadingAll = false;
  document.getElementById('btn-read-all').textContent = '▶ Read All';
  document.getElementById('btn-stop').style.display = 'none';
}

function stopAll() {
  isReadingAll = false;
  window.speechSynthesis.cancel();
  document.querySelectorAll('.sentence-en').forEach(el => el.classList.remove('playing'));
  document.querySelectorAll('.action-btn').forEach(el => {
    if (el.textContent.includes('Stop')) el.textContent = '▶ Read';
    el.classList.remove('active');
  });
  document.getElementById('btn-read-all').textContent = '▶ Read All';
  document.getElementById('btn-stop').style.display = 'none';
}

function copyBoth(idx) {
  const en = sentences[idx] || '';
  const zh = document.getElementById('zh-' + idx)?.textContent || '';
  navigator.clipboard.writeText(`${en}\n${zh}`).catch(() => {});
  const btn = document.querySelector(`#blk-${idx} .action-btn:last-child`);
  if (btn) { btn.textContent = 'Copied'; setTimeout(() => btn.textContent = 'Copy', 1400); }
}

function clearAll() {
  stopAll();
  document.getElementById('input-text').value = '';
  document.getElementById('char-count').textContent = '0 characters · 0 sentences detected';
  document.getElementById('results').innerHTML = `<div class="empty">Paste text above and click Translate<br>粘贴文字后点击翻译</div>`;
  document.getElementById('stats-bar').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('btn-read-all').style.display = 'none';
  document.getElementById('btn-stop').style.display = 'none';
  sentences = [];
}

function eh(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
