<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Home ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inconsolata:wght@300;400&display=swap" rel="stylesheet" crossorigin="anonymous">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#e8e4de;touch-action:none}
canvas{display:block;position:fixed;inset:0;width:100%;height:100%}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10}
#clk{position:absolute;top:22px;left:26px}
.ct{font-family:'Inconsolata',monospace;font-size:11px;letter-spacing:.18em;color:rgba(40,32,24,.45);text-transform:uppercase}
.cp{font-size:10px;letter-spacing:.12em;color:rgba(40,32,24,.28);margin-top:2px}
#floors{position:absolute;right:16px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:7px;pointer-events:all}
.fbtn{font-family:'Inconsolata',monospace;font-size:9px;letter-spacing:.1em;padding:7px 9px;background:rgba(28,22,14,.68);color:rgba(220,210,190,.45);border:1px solid rgba(196,164,72,.15);border-radius:2px;cursor:pointer;text-align:center;transition:all .3s;-webkit-tap-highlight-color:transparent;line-height:1.5;user-select:none}
.fbtn:hover{background:rgba(196,164,72,.12);color:rgba(220,210,190,.7)}
.fbtn.active{background:rgba(196,164,72,.18);color:rgba(220,210,190,.92);border-color:rgba(196,164,72,.5)}
/* Rotation controls */
/* Hotspot tooltip */
#tip{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);padding:9px 18px;background:rgba(30,22,16,.92);color:rgba(240,235,225,.9);font-family:'Inconsolata',monospace;font-size:11px;letter-spacing:.08em;border-radius:2px;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap}
#tip.show{opacity:1}
/* Info card */
#card{position:fixed;bottom:0;left:0;right:0;z-index:50;pointer-events:none;display:flex;justify-content:center;padding-bottom:28px}
#card-inner{pointer-events:all;background:rgba(22,16,10,.92);border:1px solid rgba(196,164,72,.22);border-radius:3px;padding:22px 28px 18px;max-width:420px;width:90%;transform:translateY(20px);opacity:0;transition:transform .32s cubic-bezier(.22,1,.36,1),opacity .28s;backdrop-filter:blur(8px)}
#card-inner.open{transform:translateY(0);opacity:1}
#card-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-style:italic;color:rgba(240,232,218,.96);letter-spacing:.04em;margin-bottom:6px}
#card-desc{font-family:'Cormorant Garamond',serif;font-size:14px;color:rgba(240,232,218,.52);line-height:1.85}
#card-close{position:absolute;top:12px;right:14px;font-size:18px;color:rgba(220,210,190,.38);cursor:pointer;font-family:'Inconsolata',monospace;transition:color .2s;line-height:1}
#card-close:hover{color:rgba(220,210,190,.85)}

/* ══ LETTER PLAYER ══ */
#lp-wrap{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;justify-content:center;padding-bottom:20px;pointer-events:none;}
#lp-box{pointer-events:all;background:rgba(16,12,8,.97);border:1px solid rgba(196,164,72,.26);border-radius:3px;width:min(500px,94vw);transform:translateY(130%);opacity:0;transition:transform .4s cubic-bezier(.22,1,.36,1),opacity .32s;backdrop-filter:blur(14px);overflow:hidden;}
#lp-box.open{transform:translateY(0);opacity:1;}
#lp-top{display:flex;align-items:center;gap:14px;padding:14px 18px 12px;border-bottom:1px solid rgba(196,164,72,.1);}
#lp-sym{width:34px;height:34px;border-radius:50%;background:rgba(196,164,72,.1);border:1px solid rgba(196,164,72,.28);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;color:rgba(196,164,72,.85);}
#lp-info{flex:1;}
#lp-ttl{font-family:‘Cormorant Garamond’,Georgia,serif;font-size:14px;font-style:italic;color:rgba(240,232,218,.92);letter-spacing:.04em;}
#lp-sub{font-family:‘Inconsolata’,monospace;font-size:9px;letter-spacing:.18em;color:rgba(196,164,72,.5);text-transform:uppercase;margin-top:2px;}
#lp-x{font-size:20px;color:rgba(220,210,190,.28);cursor:pointer;padding:4px 2px;transition:color .2s;font-family:monospace;line-height:1;}
#lp-x:hover{color:rgba(220,210,190,.75);}
#lp-scroll{padding:14px 18px;max-height:130px;overflow-y:auto;border-bottom:1px solid rgba(196,164,72,.08);}
#lp-scroll::-webkit-scrollbar{width:3px;}
#lp-scroll::-webkit-scrollbar-thumb{background:rgba(196,164,72,.2);border-radius:2px;}
#lp-letter{font-family:‘Cormorant Garamond’,Georgia,serif;font-size:13.5px;font-style:italic;color:rgba(240,232,218,.52);line-height:1.88;}
#lp-ctrl{display:flex;align-items:center;gap:12px;padding:12px 18px;}
#lp-btn{width:38px;height:38px;border-radius:50%;border:1px solid rgba(196,164,72,.38);background:rgba(196,164,72,.1);color:rgba(196,164,72,.9);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .22s;flex-shrink:0;outline:none;}
#lp-btn:hover{background:rgba(196,164,72,.22);}
#lp-btn.spin{animation:lp-spin .9s linear infinite;}
@keyframes lp-spin{to{transform:rotate(360deg);}}
#lp-wave{flex:1;height:26px;display:flex;align-items:center;gap:1.5px;}
.lp-b{border-radius:1px;background:rgba(196,164,72,.22);transition:height .08s;}
.lp-b.on{background:rgba(196,164,72,.65);}
#lp-t{font-family:‘Inconsolata’,monospace;font-size:10px;color:rgba(196,164,72,.4);letter-spacing:.06em;flex-shrink:0;}
#lp-foot{padding:0 18px 14px;display:flex;gap:8px;}
#lp-key{flex:1;background:rgba(196,164,72,.06);border:1px solid rgba(196,164,72,.18);border-radius:2px;padding:7px 10px;font-family:‘Inconsolata’,monospace;font-size:10px;color:rgba(240,232,218,.75);letter-spacing:.08em;outline:none;transition:border-color .2s;}
#lp-key:focus{border-color:rgba(196,164,72,.48);}
#lp-key::placeholder{color:rgba(196,164,72,.22);}
#lp-msg{font-family:‘Inconsolata’,monospace;font-size:9px;letter-spacing:.1em;color:rgba(196,164,72,.32);padding:0 18px 12px;text-transform:uppercase;}
</style>

</head>

</div>

  </div>
</div>
