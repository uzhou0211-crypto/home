<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marginalia · Papers</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inconsolata:wght@300;400;500&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F2EC;--bg2:#EDEAE2;--ink:#1C1814;--ink2:#6B6258;--ink3:#A09890;
  --brass:#B8904A;--sage:#7A9070;--slate:#7A8898;--rose:#B87878;
  --line:rgba(28,24,20,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inconsolata',monospace;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}

header{position:sticky;top:0;z-index:100;background:rgba(245,242,236,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px}
.h-title{font-family:'Playfair Display',serif;font-size:18px;font-style:italic;color:var(--ink);letter-spacing:.02em}
.h-right{display:flex;align-items:center;gap:14px}
.h-date{font-size:10px;letter-spacing:.14em;color:var(--ink3);text-transform:uppercase}

/* filter */
.filter-row{display:flex;gap:6px}
.ftag{padding:4px 10px;border:1px solid var(--line);background:transparent;font-family:'Inconsolata',monospace;font-size:9px;letter-spacing:.12em;color:var(--ink3);text-transform:uppercase;cursor:pointer;transition:all .2s;border-radius:2px}
.ftag:hover,.ftag.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}

/* WELCOME / FETCH PROMPT */
.welcome{padding:56px 24px;text-align:center;border-bottom:1px solid var(--line)}
.welcome-icon{font-size:32px;margin-bottom:18px;opacity:.5}
.welcome-title{font-family:'Playfair Display',serif;font-size:22px;font-style:italic;color:var(--ink);margin-bottom:10px}
.welcome-sub{font-size:11px;color:var(--ink3);letter-spacing:.08em;line-height:1.8;margin-bottom:28px;max-width:320px;margin-left:auto;margin-right:auto}
.btn-fetch{padding:13px 32px;background:var(--ink);color:var(--bg);font-family:'Inconsolata',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;border:none;cursor:pointer;transition:all .22s;display:inline-flex;align-items:center;gap:10px}
.btn-fetch:hover{background:var(--brass)}
.btn-fetch:disabled{opacity:.4;cursor:not-allowed}
.btn-fetch .spin{display:inline-block;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* HERO */
.hero{padding:28px 24px 0;border-bottom:1px solid var(--line)}
.hero-label{font-size:9px;letter-spacing:.2em;color:var(--brass);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.hero-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--brass) 0%,transparent 100%);opacity:.3}
.hero-inner{display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:start;padding-bottom:28px}
@media(max-width:680px){.hero-inner{grid-template-columns:1fr}.hero-img{order:-1;height:200px}}
.hero-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tag{font-size:8px;letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;border-radius:2px;border:1px solid currentColor}
.tag-ai{color:var(--slate)}.tag-psy{color:var(--rose)}.tag-hum{color:var(--sage)}
.tag-new{background:var(--brass);color:var(--bg);border-color:var(--brass)}
.hero-title{font-family:'Playfair Display',serif;font-size:24px;line-height:1.32;color:var(--ink);margin-bottom:10px;letter-spacing:-.01em}
.hero-abstract{font-size:12px;line-height:1.82;color:var(--ink2);margin-bottom:18px}
.hero-byline{font-size:10px;letter-spacing:.1em;color:var(--ink3);text-transform:uppercase;margin-bottom:18px}
.hero-actions{display:flex;gap:10px;align-items:center}
.btn-primary{padding:9px 20px;background:var(--ink);color:var(--bg);font-family:'Inconsolata',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;border:none;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:7px}
.btn-primary:hover{background:var(--brass)}
.btn-save{width:36px;height:36px;border:1px solid var(--line);background:transparent;font-size:16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.btn-save:hover{border-color:var(--brass);color:var(--brass)}
.btn-save.saved{background:var(--brass);border-color:var(--brass);color:var(--bg)}
.hero-img{height:280px;overflow:hidden;background:var(--bg2);position:relative}
.hero-img canvas{width:100%;height:100%;display:block}
.img-caption{position:absolute;bottom:0;left:0;right:0;padding:8px 12px;background:linear-gradient(transparent,rgba(28,24,20,.5));font-size:9px;letter-spacing:.1em;color:rgba(245,242,236,.7);text-transform:uppercase}

/* STREAM */
.stream-hdr{padding:20px 24px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
.stream-lbl{font-size:9px;letter-spacing:.2em;color:var(--ink3);text-transform:uppercase}
.stream-cnt{font-size:9px;color:var(--ink3)}
.paper-list{display:flex;flex-direction:column}
.paper-item{display:grid;grid-template-columns:88px 1fr;border-bottom:1px solid var(--line);cursor:pointer;transition:background .18s;position:relative}
.paper-item:hover{background:var(--bg2)}
.paper-item.expanded{background:var(--bg2)}
.paper-thumb{height:88px;background:var(--bg2);overflow:hidden}
.paper-thumb canvas{width:100%;height:100%;display:block}
.paper-body{padding:13px 16px 11px;min-width:0}
.paper-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.paper-idx{font-size:9px;color:var(--ink3);letter-spacing:.08em}
.paper-title-en{font-family:'Playfair Display',serif;font-size:14px;line-height:1.35;color:var(--ink);margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.paper-item.expanded .paper-title-en{-webkit-line-clamp:unset}
.paper-year{font-size:9px;color:var(--ink3);letter-spacing:.08em}
.paper-expand{grid-column:1/-1;padding:0 16px 16px 104px;display:none;animation:slideDown .22s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.paper-item.expanded .paper-expand{display:block}
.paper-expand-abstract{font-size:12px;line-height:1.85;color:var(--ink2);margin-bottom:14px;border-left:2px solid var(--line);padding-left:14px}
.expand-actions{display:flex;gap:8px;align-items:center}
.btn-sm{padding:6px 14px;font-family:'Inconsolata',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--line);background:transparent;cursor:pointer;transition:all .18s;text-decoration:none;color:var(--ink2);display:inline-block}
.btn-sm:hover{border-color:var(--ink);color:var(--ink)}
.btn-sm.saved-sm{background:var(--ink);color:var(--bg);border-color:var(--ink)}

/* LOADING */
.loading{padding:56px 24px;text-align:center}
.dots{display:flex;gap:6px;justify-content:center;margin-bottom:14px}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--brass);animation:ldot .9s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.15s}
.dots span:nth-child(3){animation-delay:.3s}
@keyframes ldot{0%,80%,100%{transform:scale(.4);opacity:.3}40%{transform:scale(1);opacity:1}}
.loading-text{font-size:10px;letter-spacing:.16em;color:var(--ink3);text-transform:uppercase}
.loading-sub{font-size:9px;color:var(--ink3);margin-top:6px;letter-spacing:.08em}

/* FOOTER */
footer{padding:28px 24px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.footer-note{font-size:9px;letter-spacing:.12em;color:var(--ink3);text-transform:uppercase}
.btn-refresh{padding:8px 16px;border:1px solid var(--line);background:transparent;font-family:'Inconsolata',monospace;font-size:9px;letter-spacing:.12em;color:var(--ink2);text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-refresh:hover{border-color:var(--brass);color:var(--brass)}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--ink);color:var(--bg);padding:10px 20px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <div class="h-title">Marginalia · Papers</div>
  <div class="h-right">
    <div class="filter-row" id="filterRow">
      <button class="ftag on" onclick="setFilter('all',this)">All</button>
      <button class="ftag" onclick="setFilter('ai',this)">AI</button>
      <button class="ftag" onclick="setFilter('psychology',this)">Psychology</button>
      <button class="ftag" onclick="setFilter('humanities',this)">Humanities</button>
    </div>
    <div class="h-date" id="hDate"></div>
  </div>
</header>

<div id="mainArea">
  <!-- welcome state -->
  <div class="welcome" id="welcomeArea">
    <div class="welcome-icon">◎</div>
    <div class="welcome-title">今天想读什么？</div>
    <div class="welcome-sub">点击下方按钮，从 arXiv 拉取最新论文<br>AI · 心理学 · 人文社科</div>
    <button class="btn-fetch" id="fetchBtn" onclick="fetchPapers()">
      <span>↓</span> 拉取今日论文
    </button>
  </div>
  <!-- content area -->
  <div id="heroSection" style="display:none"></div>
  <div id="streamArea" style="display:none">
    <div class="stream-hdr">
      <div class="stream-lbl">More Papers</div>
      <div class="stream-cnt" id="streamCnt"></div>
    </div>
    <div class="paper-list" id="paperList"></div>
  </div>
</div>

<footer>
  <div class="footer-note">arXiv · Free · No API Key Required</div>
  <button class="btn-refresh" id="refreshBtn" onclick="fetchPapers(true)" style="display:none">↻ 重新拉取</button>
</footer>

<div id="toast"></div>

<script>
// ── DATE ──
var now=new Date();
var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
document.getElementById('hDate').textContent=months[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear();

// ── ABSTRACT ART GENERATOR ──
function drawArt(canvas, cat, seed, small){
  var W=canvas.width=canvas.offsetWidth||(small?88:480);
  var H=canvas.height=canvas.offsetHeight||(small?88:280);
  var ctx=canvas.getContext('2d');
  function rng(s){s=(s*9301+49297)%233280;return s/233280}
  var pals={
    ai:        [[100,120,155],[70,90,130],[160,178,210],[40,58,90],[185,200,225]],
    psychology:[[155,100,105],[125,72,80],[210,165,168],[85,45,55],[225,190,198]],
    humanities:[[100,148,112],[72,112,82],[168,205,175],[45,82,55],[188,220,195]],
    default:   [[148,142,128],[115,108,92],[200,192,175],[80,74,58],[218,210,195]]
  };
  var pal=pals[cat]||pals.default;
  function col(i,a){var c=pal[i%pal.length];return 'rgba('+c[0]+','+c[1]+','+c[2]+','+(a||1)+')'}
  ctx.fillStyle=col(0,.15);ctx.fillRect(0,0,W,H);
  var n=small?6:14;
  for(var i=0;i<n;i++){
    var s=seed*100+i*37;
    var x=rng(s)*W,y=rng(s+1)*H,r=(rng(s+2)*.38+.08)*(small?55:200);
    var t=Math.floor(rng(s+3)*3);
    ctx.globalAlpha=rng(s+4)*.24+.06;ctx.fillStyle=col(i);ctx.beginPath();
    if(t===0){ctx.arc(x,y,r,0,Math.PI*2);}
    else if(t===1){ctx.rect(x-r*.7,y-r*.7,r*1.4,r*1.4);}
    else{ctx.moveTo(x,y-r);ctx.lineTo(x+r*.86,y+r*.5);ctx.lineTo(x-r*.86,y+r*.5);ctx.closePath();}
    ctx.fill();
  }
  ctx.globalAlpha=.038;ctx.strokeStyle='rgba(28,24,20,1)';ctx.lineWidth=.45;
  var gs=small?11:26;
  for(var gx=0;gx<W;gx+=gs){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}
  for(var gy=0;gy<H;gy+=gs){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}
  ctx.globalAlpha=1;
}

// ── ARXIV FETCH via CORS proxy ──
var PAPERS=[];
var savedIds=JSON.parse(localStorage.getItem('mg_saved')||'[]');
var expandedId=null;
var currentFilter='all';
var isFetching=false;

var QUERIES=[
  {q:'ti:large+language+model+AND+ti:human+behavior',cat:'ai'},
  {q:'ti:artificial+intelligence+AND+ti:cognition',cat:'ai'},
  {q:'ti:computational+psychology+AND+ti:behavior',cat:'psychology'},
  {q:'ti:mental+health+AND+ti:deep+learning',cat:'psychology'},
  {q:'ti:digital+humanities+AND+ti:language',cat:'humanities'},
  {q:'ti:cultural+analysis+AND+ti:natural+language',cat:'humanities'},
];

function fetchPapers(refresh){
  if(isFetching)return;
  isFetching=true;
  document.getElementById('welcomeArea').style.display='none';
  document.getElementById('heroSection').innerHTML='<div class="loading"><div class="dots"><span></span><span></span><span></span></div><div class="loading-text">Loading papers…</div><div class="loading-sub">读取今日论文</div></div>';
  document.getElementById('heroSection').style.display='block';
  document.getElementById('streamArea').style.display='none';

  // 优先读取预生成的 papers_today.json
  if(!refresh){
    fetch('papers_today.json?t='+Date.now())
      .then(function(r){ if(!r.ok) throw new Error('no file'); return r.json(); })
      .then(function(data){
        if(data && data.papers && data.papers.length > 0){
          isFetching=false;
          PAPERS=data.papers.slice(0,8);
          render();
          document.getElementById('refreshBtn').style.display='block';
          // show date
          var d=data.date||'';
          if(d){
            var info=document.createElement('div');
            info.style.cssText='font-family:Inconsolata,monospace;font-size:9px;letter-spacing:.12em;color:var(--ink3);text-transform:uppercase;padding:8px 24px;';
            info.textContent='Papers from '+d+' · click ↻ to refresh from arXiv live';
            document.getElementById('streamArea').prepend(info);
          }
          return;
        }
        throw new Error('empty');
      })
      .catch(function(){ fetchFromArxiv(); });
    return;
  }
  fetchFromArxiv();
}

function fetchFromArxiv(){

  var allPapers=[],seen=new Set(),done=0;

  function oneDone(){
    done++;
    if(done===QUERIES.length){
      isFetching=false;
      PAPERS=allPapers.slice(0,8);
      if(PAPERS.length===0){showError();}
      else{render();document.getElementById('refreshBtn').style.display='block';}
    }
  }
  QUERIES.forEach(function(q){
    var arxivUrl='https://export.arxiv.org/api/query?search_query='+q.q
      +'&sortBy=submittedDate&sortOrder=descending&max_results=2';
    // try proxies in order until one works
    var proxies=[
      'https://corsproxy.io/?'+encodeURIComponent(arxivUrl),
      'https://api.allorigins.win/raw?url='+encodeURIComponent(arxivUrl)
    ];
    function tryNext(i){
      if(i>=proxies.length){oneDone();return;}
      fetch(proxies[i])
        .then(function(r){
          if(!r.ok)throw new Error('status '+r.status);
          return r.text();
        })
        .then(function(xml){
          parseArxiv(xml,q.cat).forEach(function(p){
            if(!seen.has(p.id)){seen.add(p.id);allPapers.push(p);}
          });
          oneDone();
        })
        .catch(function(){tryNext(i+1);});
    }
    tryNext(0);
  });
}

}

function parseArxiv(xml,cat){
  var papers=[];
  var entries=xml.split('<entry>').slice(1);
  entries.forEach(function(entry){
    function g(tag){
      var s=entry.indexOf('<'+tag);if(s<0)return'';
      s=entry.indexOf('>',s)+1;var e=entry.indexOf('</'+tag+'>',s);
      return e>0?entry.slice(s,e).trim().replace(/\n/g,' '):'';
    }
    var title=g('title'),abstract=g('summary');
    var auth='';var ai=entry.indexOf('<name>');
    if(ai>=0){var ae=entry.indexOf('</name>',ai);auth=entry.slice(ai+6,ae).trim();}
    var link='';var li=entry.indexOf('<id>');
    if(li>=0){var le=entry.indexOf('</id>',li);link=entry.slice(li+4,le).trim();}
    var pub=g('published').slice(0,4)||String(new Date().getFullYear());
    if(title) papers.push({
      id:link.split('/').pop()||title.slice(0,16),
      title:title, abstract:abstract.slice(0,550),
      authors:(auth?auth+' et al.':'Unknown'),
      year:pub, venue:'arXiv', url:link, cat:cat,
      seed:Math.abs(title.split('').reduce(function(a,c){return(a<<5)-a+c.charCodeAt(0)|0},0))%100
    });
  });
  return papers;
}

function showError(){
  document.getElementById('heroSection').innerHTML=
    '<div class="loading"><div class="welcome-icon" style="font-size:24px;opacity:.4">✕</div>'+
    '<div class="loading-text" style="margin-top:12px">网络受限，无法访问 arXiv</div>'+
    '<div class="loading-sub" style="margin-top:6px">请检查网络或稍后再试</div></div>';
}

function getFiltered(){
  if(currentFilter==='all')return PAPERS;
  return PAPERS.filter(function(p){return p.cat===currentFilter;});
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.ftag').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  if(PAPERS.length) render();
}

function render(){
  var filtered=getFiltered();
  if(!filtered.length){
    document.getElementById('heroSection').innerHTML='<div class="loading"><div class="loading-text">该分类暂无论文</div></div>';
    document.getElementById('streamArea').style.display='none';
    return;
  }
  renderHero(filtered[0]);
  renderStream(filtered.slice(1));
  document.getElementById('streamArea').style.display='block';
}

function renderHero(p){
  var catLabel={ai:'AI / ML',psychology:'Psychology',humanities:'Humanities'};
  var catClass={ai:'tag-ai',psychology:'tag-psy',humanities:'tag-hum'};
  var isSaved=savedIds.indexOf(p.id)>=0;
  document.getElementById('heroSection').innerHTML=
    '<div class="hero">'+
    '<div class="hero-label">Today\'s Lead</div>'+
    '<div class="hero-inner">'+
      '<div>'+
        '<div class="hero-tags"><span class="tag tag-new">Latest</span><span class="tag '+catClass[p.cat]+'">'+catLabel[p.cat]+'</span></div>'+
        '<h1 class="hero-title">'+p.title+'</h1>'+
        '<p class="hero-abstract">'+p.abstract+'</p>'+
        '<div class="hero-byline">'+p.authors+' · '+p.venue+' · '+p.year+'</div>'+
        '<div class="hero-actions">'+
          '<a href="'+p.url+'" target="_blank" class="btn-primary">Read Paper →</a>'+
          '<button class="btn-save'+(isSaved?' saved':'')+'" onclick="toggleSave(\''+p.id+'\')" id="hsave-'+p.id+'">'+( isSaved?'✦':'✧')+'</button>'+
        '</div>'+
      '</div>'+
      '<div class="hero-img"><canvas id="hcv"></canvas><div class="img-caption">'+p.cat.toUpperCase()+' · ABSTRACT VIZ</div></div>'+
    '</div></div>';
  requestAnimationFrame(function(){
    var cv=document.getElementById('hcv');
    if(cv){cv.width=cv.offsetWidth;cv.height=cv.offsetHeight;drawArt(cv,p.cat,p.seed,false);}
  });
}

function renderStream(papers){
  var list=document.getElementById('paperList');
  document.getElementById('streamCnt').textContent=papers.length+' papers';
  list.innerHTML='';
  var catClass={ai:'tag-ai',psychology:'tag-psy',humanities:'tag-hum'};
  var catLabel={ai:'AI',psychology:'Psych',humanities:'Hum'};
  papers.forEach(function(p,idx){
    var isSaved=savedIds.indexOf(p.id)>=0;
    var item=document.createElement('div');
    item.className='paper-item'; item.id='item-'+p.id;
    item.innerHTML=
      '<div class="paper-thumb"><canvas id="cv-'+p.id+'"></canvas></div>'+
      '<div class="paper-body">'+
        '<div class="paper-meta">'+
          '<span class="paper-idx">'+String(idx+1).padStart(2,'0')+'</span>'+
          '<span class="tag '+catClass[p.cat]+'">'+catLabel[p.cat]+'</span>'+
        '</div>'+
        '<div class="paper-title-en">'+p.title+'</div>'+
        '<div class="paper-year">'+p.authors+' · '+p.year+'</div>'+
      '</div>'+
      '<div class="paper-expand">'+
        '<p class="paper-expand-abstract">'+p.abstract+'</p>'+
        '<div class="expand-actions">'+
          '<a href="'+p.url+'" target="_blank" class="btn-sm">Read →</a>'+
          '<button class="btn-sm'+(isSaved?' saved-sm':'')+'" onclick="toggleSave(\''+p.id+'\')" id="ssave-'+p.id+'">'+( isSaved?'✦ Saved':'✧ Save')+'</button>'+
        '</div>'+
      '</div>';
    item.addEventListener('click',function(e){
      if(e.target.tagName==='BUTTON'||e.target.tagName==='A')return;
      var el=document.getElementById('item-'+p.id);
      if(expandedId&&expandedId!==p.id){
        var old=document.getElementById('item-'+expandedId);
        if(old)old.classList.remove('expanded');
      }
      el.classList.toggle('expanded');
      expandedId=el.classList.contains('expanded')?p.id:null;
    });
    list.appendChild(item);
    requestAnimationFrame(function(){
      var cv=document.getElementById('cv-'+p.id);
      if(cv){cv.width=cv.offsetWidth||88;cv.height=cv.offsetHeight||88;drawArt(cv,p.cat,p.seed,true);}
    });
  });
}

function toggleSave(id){
  var idx=savedIds.indexOf(id);
  if(idx>=0){savedIds.splice(idx,1);showToast('已从阅读清单移除');}
  else{savedIds.push(id);showToast('✦ 已存入阅读清单');}
  localStorage.setItem('mg_saved',JSON.stringify(savedIds));
  // update hero button
  var hb=document.getElementById('hsave-'+id);
  if(hb){var s=savedIds.indexOf(id)>=0;hb.className='btn-save'+(s?' saved':'');hb.textContent=s?'✦':'✧';}
  // update stream button
  var sb=document.getElementById('ssave-'+id);
  if(sb){var s2=savedIds.indexOf(id)>=0;sb.className='btn-sm'+(s2?' saved-sm':'');sb.textContent=s2?'✦ Saved':'✧ Save';}
}

var toastT;
function showToast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(function(){el.classList.remove('show');},2200);
}
</script>
</body>
</html>
