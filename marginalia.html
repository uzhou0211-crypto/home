<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>書頁 · Marginalia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=Inconsolata:wght@300;400&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #faf7f2;
  --bg-2:       #f4f0e8;
  --white:      #ffffff;
  --ink:        #1a1710;
  --ink-2:      #2e2a20;
  --ink-3:      #5a5548;
  --ink-4:      #8a8470;
  --ink-5:      #b8b0a0;
  /* three highlight colors */
  --yellow:     #f5c842;
  --yellow-bg:  rgba(245,200,66,0.22);
  --yellow-pale:#fef9e0;
  --pink:       #f0829a;
  --pink-bg:    rgba(240,130,154,0.18);
  --pink-pale:  #fef0f3;
  --purple:     #9b7ec8;
  --purple-bg:  rgba(155,126,200,0.18);
  --purple-pale:#f5f0fc;
  --border:     rgba(90,85,72,0.12);
  --border-2:   rgba(90,85,72,0.20);
  --shadow:     rgba(26,23,16,0.06);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Crimson Pro', 'Noto Serif SC', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── INTRO ANIMATION ── */
.intro {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.intro.done { display: none; }

.intro-words {
  position: relative; width: 480px; height: 320px;
  display: flex; align-items: center; justify-content: center;
}

.word {
  position: absolute;
  font-family: 'EB Garamond', serif;
  font-style: italic;
  color: var(--ink);
  opacity: 0;
  animation: wordFall 0.7s cubic-bezier(.22,.68,0,1.1) forwards;
}

@keyframes wordFall {
  from { opacity: 0; transform: translateY(-28px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes wordFade {
  0%   { opacity: 1; }
  100% { opacity: 0; transform: translateY(16px); }
}

.intro-line-1 { font-size: 42px; font-weight: 400; }
.intro-line-2 { font-size: 28px; font-weight: 300; color: var(--ink-3); }

/* ── BOTANICAL BACKGROUND ── */
.botanical-fixed {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
}

/* ── MAIN ── */
.main-content { position: relative; z-index: 1; }

/* ── HEADER ── */
.site-header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(250,247,242,0.92);
  -webkit-backdrop-filter: blur(14px);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  max-width: 960px; margin: 0 auto;
  padding: 0 40px; height: 60px;
  display: flex; align-items: center; gap: 16px;
}
.logo {
  font-family: 'EB Garamond', serif;
  font-size: 21px; font-style: italic;
  color: var(--ink);
}
.logo-sub {
  font-family: 'Inconsolata', monospace; font-size: 9px;
  letter-spacing: 0.2em; color: var(--ink-4); text-transform: uppercase;
}
nav { display: flex; gap: 2px; margin-left: auto; }
.nav-btn {
  background: none; border: none; cursor: pointer;
  font-family: 'Inconsolata', monospace; font-size: 10px;
  letter-spacing: 0.14em; color: var(--ink-4); text-transform: uppercase;
  padding: 7px 14px; border-radius: 3px; transition: all 0.2s;
  position: relative;
}
.nav-btn::after {
  content: ''; position: absolute; bottom: 5px; left: 50%;
  transform: translateX(-50%); width: 0; height: 1px;
  background: var(--purple); transition: width 0.2s;
}
.nav-btn:hover { color: var(--ink); }
.nav-btn:hover::after, .nav-btn.active::after { width: 14px; }
.nav-btn.active { color: var(--ink); }

/* ── PAGES ── */
.page { display: none; }
.page.active { display: block; animation: pageIn 0.4s ease both; }
@keyframes pageIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

/* ── HERO ── */
.hero {
  max-width: 960px; margin: 0 auto;
  padding: 60px 40px 48px;
  border-bottom: 1px solid var(--border);
}
.hero-kicker {
  font-family: 'Inconsolata', monospace; font-size: 9.5px;
  letter-spacing: 0.22em; color: var(--ink-4); text-transform: uppercase;
  margin-bottom: 18px; display: flex; align-items: center; gap: 10px;
}
.hero-kicker::before { content: ''; width: 20px; height: 1px; background: var(--purple); }
.hero-title {
  font-family: 'EB Garamond', serif;
  font-size: clamp(40px, 5vw, 62px);
  font-weight: 400; line-height: 1.08; color: var(--ink);
}
.hero-title em { font-style: italic; color: var(--purple); }
.hero-sub {
  margin-top: 14px; font-size: 16px; color: var(--ink-3);
  line-height: 1.82; max-width: 400px;
  font-family: 'Noto Serif SC', serif;
}
.hero-stats { margin-top: 28px; display: flex; gap: 36px; }
.stat-n {
  font-family: 'EB Garamond', serif; font-size: 34px;
  font-weight: 400; color: var(--ink); line-height: 1;
}
.stat-l {
  font-family: 'Inconsolata', monospace; font-size: 9px;
  letter-spacing: 0.12em; color: var(--ink-4); text-transform: uppercase; margin-top: 3px;
}

/* ── COLOR LEGEND ── */
.legend {
  display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap;
}
.legend-item {
  display: flex; align-items: center; gap: 7px;
  font-family: 'Inconsolata', monospace; font-size: 10px;
  letter-spacing: 0.08em; color: var(--ink-4);
}
.legend-dot {
  width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0;
}

/* ── CONTENT ── */
.content { max-width: 960px; margin: 0 auto; padding: 40px 40px 80px; }

.s-label {
  font-family: 'Inconsolata', monospace; font-size: 9.5px;
  letter-spacing: 0.2em; color: var(--ink-4); text-transform: uppercase;
  margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
}
.s-label::after { content: ''; flex: 1; height: 1px; background: var(--border-2); }

/* ── COLOR PICKER ── */
.color-picker {
  display: flex; gap: 10px; margin-bottom: 20px;
}
.color-opt {
  display: flex; align-items: center; gap: 8px; cursor: pointer;
  padding: 8px 16px; border-radius: 20px; border: 1.5px solid transparent;
  font-family: 'Inconsolata', monospace; font-size: 10px;
  letter-spacing: 0.08em; text-transform: uppercase; transition: all 0.18s;
  background: var(--bg-2);
}
.color-opt.yellow { border-color: rgba(245,200,66,0.4); }
.color-opt.pink   { border-color: rgba(240,130,154,0.4); }
.color-opt.purple { border-color: rgba(155,126,200,0.4); }
.color-opt.sel.yellow { background: var(--yellow-pale); border-color: var(--yellow); }
.color-opt.sel.pink   { background: var(--pink-pale);   border-color: var(--pink); }
.color-opt.sel.purple { background: var(--purple-pale); border-color: var(--purple); }
.color-swatch {
  width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0;
}

/* ── FORM ── */
.form-card {
  background: var(--white);
  border: 1px solid var(--border-2); border-radius: 6px;
  box-shadow: 0 2px 16px var(--shadow);
  overflow: hidden; margin-bottom: 32px;
  transition: border-color 0.2s;
}
.form-card.c-yellow { border-left: 3px solid var(--yellow); }
.form-card.c-pink   { border-left: 3px solid var(--pink); }
.form-card.c-purple { border-left: 3px solid var(--purple); }

.form-inner { padding: 24px 28px; }

.f-label {
  display: block; font-family: 'Inconsolata', monospace; font-size: 9px;
  letter-spacing: 0.18em; color: var(--ink-4); text-transform: uppercase; margin-bottom: 7px;
}
.inp {
  width: 100%; padding: 11px 15px; margin-bottom: 14px;
  background: var(--bg); border: 1px solid var(--border-2); border-radius: 4px;
  font-family: 'Crimson Pro', serif; font-size: 16px;
  color: var(--ink); outline: none; transition: all 0.2s;
}
.inp:focus { background: var(--white); box-shadow: 0 0 0 3px rgba(155,126,200,0.1); }
.inp::placeholder { color: var(--ink-5); font-style: italic; }

.textarea {
  width: 100%; padding: 13px 15px; margin-bottom: 14px;
  background: var(--bg); border: 1px solid var(--border-2); border-radius: 4px;
  font-family: 'Crimson Pro', serif; font-size: 16px;
  color: var(--ink); outline: none; resize: vertical; min-height: 100px;
  line-height: 1.78; transition: all 0.2s;
}
.textarea:focus { background: var(--white); box-shadow: 0 0 0 3px rgba(155,126,200,0.1); }
.textarea::placeholder { color: var(--ink-5); font-style: italic; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.btn-submit {
  padding: 11px 28px; border: none; border-radius: 4px; cursor: pointer;
  font-family: 'EB Garamond', serif; font-size: 17px; font-style: italic;
  transition: all 0.2s; margin-top: 6px;
  color: var(--white);
}
.btn-submit.c-yellow { background: #c9a020; }
.btn-submit.c-yellow:hover { background: #b08010; transform: translateY(-1px); }
.btn-submit.c-pink   { background: var(--pink); }
.btn-submit.c-pink:hover { background: #e06080; transform: translateY(-1px); }
.btn-submit.c-purple { background: var(--purple); }
.btn-submit.c-purple:hover { background: #7a5eb0; transform: translateY(-1px); }

/* ── FEED ── */
.feed { display: flex; flex-direction: column; gap: 0; }

.book-group { margin-bottom: 48px; }
.book-header {
  display: flex; align-items: baseline; gap: 14px;
  padding-bottom: 14px; margin-bottom: 0;
  border-bottom: 1px solid var(--border-2);
}
.book-title-big {
  font-family: 'EB Garamond', serif; font-size: 22px; font-style: italic; color: var(--ink);
}
.book-author {
  font-family: 'Inconsolata', monospace; font-size: 10px; color: var(--ink-4); letter-spacing: 0.06em;
}
.book-count { margin-left: auto; font-family: 'Inconsolata', monospace; font-size: 9.5px; color: var(--ink-5); }

.entry {
  padding: 18px 0 18px 16px; border-bottom: 1px solid var(--border);
  border-left: 3px solid transparent; transition: all 0.15s;
}
.entry:last-child { border-bottom: none; }
.entry.c-yellow { border-left-color: var(--yellow); background: rgba(245,200,66,0.04); }
.entry.c-pink   { border-left-color: var(--pink);   background: rgba(240,130,154,0.04); }
.entry.c-purple { border-left-color: var(--purple); background: rgba(155,126,200,0.04); }

.entry-type-label {
  font-family: 'Inconsolata', monospace; font-size: 9px;
  letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.entry-type-label.c-yellow { color: #a07800; }
.entry-type-label.c-pink   { color: #c05070; }
.entry-type-label.c-purple { color: var(--purple); }

.entry-swatch {
  width: 10px; height: 10px; border-radius: 2px;
}

/* highlighted text styled with color underline */
.entry-quote {
  font-family: 'EB Garamond', serif; font-size: 19px;
  line-height: 1.72; color: var(--ink); display: inline;
}
.entry-quote.c-yellow {
  background: linear-gradient(to bottom, transparent 85%, rgba(245,200,66,0.5) 85%);
}
.entry-quote.c-pink {
  background: linear-gradient(to bottom, transparent 85%, rgba(240,130,154,0.45) 85%);
}
.entry-quote.c-purple {
  background: linear-gradient(to bottom, transparent 85%, rgba(155,126,200,0.4) 85%);
}

.entry-reflection {
  font-family: 'Crimson Pro', serif; font-size: 16px;
  line-height: 1.85; color: var(--ink-2); font-style: italic;
}
.entry-reflection-trigger {
  font-family: 'EB Garamond', serif; font-size: 14px;
  color: var(--ink-4); margin-bottom: 8px; font-style: italic;
  display: flex; align-items: flex-start; gap: 6px;
}

.entry-meta {
  margin-top: 8px; font-family: 'Inconsolata', monospace;
  font-size: 9.5px; color: var(--ink-5); letter-spacing: 0.05em;
}

.entry-response {
  margin-top: 14px; padding: 11px 15px;
  background: var(--bg-2); border-radius: 4px;
  border-left: 2px solid var(--ink-5);
}
.entry-response-who {
  font-family: 'Inconsolata', monospace; font-size: 9px;
  letter-spacing: 0.1em; color: var(--ink-4); text-transform: uppercase; margin-bottom: 5px;
}
.entry-response-text {
  font-family: 'Crimson Pro', serif; font-size: 15px;
  line-height: 1.78; color: var(--ink-3); font-style: italic;
}

/* filter */
.filter-row { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.filter-btn {
  padding: 5px 14px; border-radius: 14px; cursor: pointer;
  font-family: 'Inconsolata', monospace; font-size: 10px;
  letter-spacing: 0.08em; text-transform: uppercase;
  border: 1px solid var(--border-2); background: transparent;
  color: var(--ink-4); transition: all 0.16s;
}
.filter-btn:hover { background: var(--bg-2); color: var(--ink-3); }
.filter-btn.on { background: var(--ink); color: var(--white); border-color: var(--ink); }

/* empty */
.empty-s { text-align: center; padding: 80px 20px; }
.empty-big { font-family: 'EB Garamond', serif; font-size: 46px; font-style: italic; color: var(--ink); margin-bottom: 10px; }
.empty-sm { font-family: 'Inconsolata', monospace; font-size: 10.5px; color: var(--ink-4); letter-spacing: 0.1em; line-height: 2; text-transform: uppercase; }

@media(max-width:680px) {
  .header-inner, .hero, .content { padding-left: 20px; padding-right: 20px; }
  .form-row { grid-template-columns: 1fr; }
  .color-picker { flex-wrap: wrap; }
}
</style>
</head>
<body>

<!-- ── INTRO ANIMATION ── -->
<div class="intro" id="intro">
  <div class="intro-words" id="intro-words"></div>
</div>

<!-- ── BOTANICAL BACKGROUND ── -->
<div class="botanical-fixed">
  <svg viewBox="0 0 900 1000" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;position:absolute;inset:0" preserveAspectRatio="xMidYMid slice">

</div>

<div class="main-content">
<header class="site-header">
  <div class="header-inner">
    <div>
      <div class="logo">Marginalia</div>
      <div class="logo-sub">書頁 · Reading Record</div>
    </div>
    <nav>
      <button class="nav-btn active" onclick="go('add')" id="nav-add">Add · 添加</button>
      <button class="nav-btn" onclick="go('feed')" id="nav-feed">Library · 书库</button>
      <button class="nav-btn" onclick="go('recommend')" id="nav-recommend">Ask · 推书</button>
    </nav>
  </div>
</header>

<!-- ADD PAGE -->
<div class="page active" id="page-add">
  <div class="hero">
    <div class="hero-kicker">Reading Record · 书页留痕</div>
    <h1 class="hero-title">Mark what <em>moves you.</em></h1>
    <p class="hero-sub">划线是轻的，只是想留住它。<br>感悟是重的，是你真的想说的话。</p>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--yellow)"></div>
        这句话写得好
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--pink)"></div>
        也很喜欢
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--purple)"></div>
        这里有感悟
      </div>
    </div>
    <div class="hero-stats" style="margin-top:20px">
      <div><div class="stat-n" id="stat-total">0</div><div class="stat-l">Total entries</div></div>
      <div><div class="stat-n" id="stat-reflect">0</div><div class="stat-l">Reflections · 感悟</div></div>
    </div>
  </div>

  <div class="content">

    <!-- color picker -->
    <div class="s-label">Choose color · 选颜色</div>
    <div class="color-picker">
      <div class="color-opt yellow sel" onclick="pickColor('yellow',this)">
        <div class="color-swatch" style="background:var(--yellow)"></div>
        这句话写得好
      </div>
      <div class="color-opt pink" onclick="pickColor('pink',this)">
        <div class="color-swatch" style="background:var(--pink)"></div>
        也很喜欢
      </div>
      <div class="color-opt purple" onclick="pickColor('purple',this)">
        <div class="color-swatch" style="background:var(--purple)"></div>
        这里有感悟
      </div>
    </div>

    <!-- dynamic form -->
    <div class="form-card c-yellow" id="entry-form">
      <div class="form-inner">
        <div class="form-row" style="margin-bottom:14px">
          <div>
            <label class="f-label">Book · 书名</label>
            <input class="inp" id="f-book" placeholder="书名 · Book title" style="margin-bottom:0">
          </div>
          <div>
            <label class="f-label">Author · 作者</label>
            <input class="inp" id="f-author" placeholder="作者 · Author" style="margin-bottom:0">
          </div>
        </div>

        <!-- quote field — always shown -->
        <div style="margin-bottom:14px">
          <label class="f-label" id="quote-label">The line · 这句话</label>
          <textarea class="textarea" id="f-quote" placeholder="把那句话粘贴或者手打进来 …&#10;The line that made you stop."></textarea>
        </div>

        <!-- reflection field — shown for purple -->
        <div id="reflect-area" style="display:none;margin-bottom:14px">
          <label class="f-label">Your reflection · 你想说的</label>
          <textarea class="textarea" id="f-reflect" placeholder="说什么都行，长短都行，甚至只是一个字 …&#10;Whatever it is you want to say."></textarea>
        </div>

        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <div>
            <label class="f-label">Page · 页码</label>
            <input class="inp" id="f-page" placeholder="p. 47" style="width:100px;margin-bottom:0">
          </div>
          <button class="btn-submit c-yellow" id="btn-submit" onclick="addEntry()" style="margin-top:18px">
            Save · 存下来
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- LIBRARY PAGE -->
<div class="page" id="page-feed">
  <div class="hero" style="padding-bottom:36px">
    <div class="hero-kicker">Library · 书库</div>
    <h1 class="hero-title">Everything <em>you've marked.</em></h1>
  </div>
  <div class="content">
    <div class="filter-row">
      <button class="filter-btn on" onclick="setFilter('all',this)">All · 全部</button>
      <button class="filter-btn" onclick="setFilter('yellow',this)">● 写得好</button>
      <button class="filter-btn" onclick="setFilter('pink',this)">● 也喜欢</button>
      <button class="filter-btn" onclick="setFilter('purple',this)">● 有感悟</button>
    </div>
    <div id="feed" class="feed"></div>
  </div>
</div>
</div><!-- end main-content -->

<script>
// ── INTRO ANIMATION ──────────────────────────────
const introLines = [
  { text: 'Mark what moves you.', size: '38px', delay: 0 },
  { text: '划线是轻的', size: '28px', delay: 500 },
  { text: '感悟是重的', size: '28px', delay: 900 },
  { text: '都值得留下来', size: '22px', delay: 1300 },
];

function runIntro() {
  const container = document.getElementById('intro-words');
  let topOffset = 0;

  introLines.forEach((line, i) => {
    const el = document.createElement('div');
    el.className = 'word intro-line-' + (i < 2 ? '1' : '2');
    el.textContent = line.text;
    el.style.fontSize = line.size;
    el.style.top = (80 + topOffset) + 'px';
    el.style.left = '50%';
    el.style.transform = 'translateX(-50%) translateY(-28px)';
    el.style.whiteSpace = 'nowrap';
    el.style.animationDelay = line.delay + 'ms';
    container.appendChild(el);
    topOffset += parseInt(line.size) * 1.5;
  });

  // fade out and hide after all lines shown
  setTimeout(() => {
    const intro = document.getElementById('intro');
    intro.style.transition = 'opacity 0.6s ease';
    intro.style.opacity = '0';
    setTimeout(() => intro.classList.add('done'), 650);
  }, 2200);
}

runIntro();

// ── STATE ────────────────────────────────────────


// ── Ombre Brain ────────────────────────────────────
const OMBRE = 'https://ombre-brain-production-f64f.up.railway.app/mcp';
async function ombreTool(tool, args) {{
  try {{
    const res = await fetch(OMBRE, {{
      method: 'POST',
      headers: {{'Content-Type': 'application/json'}},
      body: JSON.stringify({{jsonrpc:'2.0',id:Date.now(),method:'tools/call',params:{{name:tool,arguments:args}}}})
    }});
    const data = await res.json();
    const content = data.result?.content;
    return Array.isArray(content) ? content.map(c=>c.text||'').join('\n') : '';
  }} catch(e) {{ return ''; }}
}}

let entries = JSON.parse(localStorage.getItem('marginalia-v2') || '[]');
let currentColor = 'yellow';
let currentFilter = 'all';
upStats();

// ── NAV ──────────────────────────────────────────
function go(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.getElementById('nav-' + id).classList.add('active');
  if (id === 'feed') render();
}

// ── COLOR PICKER ─────────────────────────────────
function pickColor(c, el) {
  currentColor = c;
  document.querySelectorAll('.color-opt').forEach(o => o.classList.remove('sel'));
  el.classList.add('sel');

  // update form card border
  const form = document.getElementById('entry-form');
  form.className = 'form-card c-' + c;

  // update submit button color
  const btn = document.getElementById('btn-submit');
  btn.className = 'btn-submit c-' + c;

  // show/hide reflection area
  const reflectArea = document.getElementById('reflect-area');
  const quoteLabel = document.getElementById('quote-label');
  if (c === 'purple') {
    reflectArea.style.display = 'block';
    quoteLabel.textContent = 'Trigger line · 触发这个感悟的句子（可不填）';
    document.getElementById('f-quote').placeholder = '如果有一句话触发了这个感悟，可以写在这里 …';
    btn.textContent = 'Record · 记下来';
  } else {
    reflectArea.style.display = 'none';
    quoteLabel.textContent = 'The line · 这句话';
    document.getElementById('f-quote').placeholder = '把那句话粘贴或者手打进来 …\nThe line that made you stop.';
    btn.textContent = 'Save · 存下来';
  }
}

// ── ADD ENTRY ────────────────────────────────────
function addEntry() {
  const quote = document.getElementById('f-quote').value.trim();
  const reflect = document.getElementById('f-reflect').value.trim();

  // purple needs either quote or reflection
  if (currentColor === 'purple' && !reflect && !quote) return;
  if (currentColor !== 'purple' && !quote) return;

  const entry = {
    id: Date.now(),
    color: currentColor,
    book: document.getElementById('f-book').value.trim() || 'Untitled',
    author: document.getElementById('f-author').value.trim() || '',
    quote,
    reflect: currentColor === 'purple' ? reflect : '',
    page: document.getElementById('f-page').value.trim() || '',
    date: new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }),
    response: null
  };

  entries.unshift(entry);
  save();
  ombreTool('marginalia_save', {entry_id:entry.id, book:entry.book||'', author:entry.author||'', quote:entry.quote||'', color:entry.color||'yellow', reflect:entry.reflect||'', page:entry.page||'', date:entry.date||''});
  upStats();

  // clear
  ['f-book','f-author','f-quote','f-reflect','f-page'].forEach(id => document.getElementById(id).value = '');

  // brief confirmation
  const btn = document.getElementById('btn-submit');
  const orig = btn.textContent;
  btn.textContent = '✓ Saved';
  setTimeout(() => btn.textContent = orig, 1600);
}

// ── FILTER ───────────────────────────────────────
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  render();
}

// ── RENDER ───────────────────────────────────────
function render() {
  const el = document.getElementById('feed');
  const filtered = currentFilter === 'all' ? entries : entries.filter(e => e.color === currentFilter);

  if (!filtered.length) {
    el.innerHTML = `<div class="empty-s"><div class="empty-big">Empty pages.</div><div class="empty-sm">Add a highlight or reflection<br>to begin</div></div>`;
    return;
  }

  // group by book
  const books = {};
  filtered.forEach(e => {
    const key = e.book + '§' + e.author;
    if (!books[key]) books[key] = { book: e.book, author: e.author, entries: [] };
    books[key].entries.push(e);
  });

  const colorLabel = { yellow: '这句话写得好', pink: '也很喜欢', purple: '有感悟' };
  const colorHex   = { yellow: 'var(--yellow)', pink: 'var(--pink)', purple: 'var(--purple)' };

  el.innerHTML = Object.values(books).map(b => {
    const entriesHtml = b.entries.map(e => {
      const isReflect = e.color === 'purple';
      const mainHtml = isReflect
        ? `${e.quote ? `<div class="entry-reflection-trigger">" ${eh(e.quote)} "</div>` : ''}
           <div class="entry-reflection">${eh(e.reflect || e.quote)}</div>`
        : `<div class="entry-quote c-${e.color}">${eh(e.quote)}</div>`;

      return `<div class="entry c-${e.color}">
        <div class="entry-type-label c-${e.color}">
          <div class="entry-swatch" style="background:${colorHex[e.color]}"></div>
          ${colorLabel[e.color]}
        </div>
        ${mainHtml}
        <div class="entry-meta">${e.page ? `p. ${eh(e.page)} · ` : ''}${e.date}</div>
        ${e.response ? `<div class="entry-response">
          <div class="entry-response-who">My response · 我的回应</div>
          <div class="entry-response-text">${eh(e.response)}</div>
        </div>` : ''}
      </div>`;
    }).join('');

    const counts = ['yellow','pink','purple'].map(c => {
      const n = b.entries.filter(e => e.color === c).length;
      return n ? `${n} ${colorLabel[c]}` : '';
    }).filter(Boolean).join(' · ');

    return `<div class="book-group">
      <div class="book-header">
        <div class="book-title-big">${eh(b.book)}</div>
        ${b.author ? `<div class="book-author">${eh(b.author)}</div>` : ''}
        <div class="book-count">${counts}</div>
      </div>
      ${entriesHtml}
    </div>`;
  }).join('');
}

function upStats() {
  document.getElementById('stat-total').textContent = entries.length;
  document.getElementById('stat-reflect').textContent = entries.filter(e => e.color === 'purple').length;
}
function save() { localStorage.setItem('marginalia-v2', JSON.stringify(entries)); }
function eh(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
